<style>
:root {
  --bg: #0d1117;
  --bg-card: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --orange: #d2991d;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px;
}
.header {
  display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px 24px;
}
.header .name { font-size: 24px; font-weight: 700; }
.header .code { color: var(--text-dim); font-size: 16px; font-family: 'SF Mono', 'Consolas', monospace; }
.header .date { color: var(--text-dim); font-size: 13px; margin-left: auto; display: flex; align-items: center; gap: 8px; }
.header .back {
  background: rgba(88,166,255,0.1); color: var(--accent); border: 1px solid rgba(88,166,255,0.3);
  padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; text-decoration: none;
  transition: background 0.15s;
}
.header .back:hover { background: rgba(88,166,255,0.2); }

.nav-btn {
  background: rgba(88,166,255,0.08);
  color: var(--text-dim);
  border: 1px solid rgba(48,54,61,0.8);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 24px;
  text-decoration: none;
  transition: all 0.15s;
  white-space: nowrap;
}
.nav-btn:hover { background: rgba(88,166,255,0.15); color: var(--text); border-color: var(--accent); }
.nav-btn.disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

.stats-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px 20px;
}
.stat-label { color: var(--text-dim); font-size: 12px; margin-bottom: 6px; }
.stat-value { font-size: 20px; font-weight: 700; }
.val-up { color: var(--red); }
.val-down { color: var(--green); }
.val-neutral { color: var(--text); }

.chart-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; margin-bottom: 20px;
}
.chart-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
.chart-wrap { height: 500px; }

.footer {
  text-align: center; color: var(--text-dim); font-size: 12px;
  padding: 20px 0 10px; border-top: 1px solid var(--border); margin-top: 20px;
}

/* =============================================
   Mobile Responsive — < 768px
   ============================================= */
@media (max-width: 768px) {
  /* Header */
  .header {
    flex-direction: column;
    align-items: flex-start;
    padding: 16px 16px 12px;
    gap: 10px;
  }
  .header-logo {
    height: 80px !important;   /* shrink from 144px */
    width: auto !important;
    flex-shrink: 0;
  }
  .header-title {
    flex-grow: unset;
    width: 100%;
  }
  .header h1 { font-size: 20px !important; }
  .header p   { font-size: 13px !important; margin-top: 4px; }
  .header-credit { font-size: 14px !important; margin-top: 4px; }
  .header-qrcode { display: none; }   /* hide QR on mobile */

  /* Tabs */
  .tabs {
    padding: 0 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    padding: 12px 20px;
    font-size: 14px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .stats-row {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 10px;
    padding: 16px 16px 12px;

  .stat-card { padding: 14px 12px; }
  .stat-label { font-size: 12px; }
  .stat-value { font-size: 20px; }

  .charts-row {
    grid-template-columns: 1fr !important;
    padding: 0 16px 16px;

  .table-section { padding: 0 16px 24px; }

    gap: 8px;

  .table-scroll { max-height: 400px; }
  table { font-size: 13px !important; }
  th { padding: 8px 10px; font-size: 13px !important; }
  td { padding: 7px 10px; }

  /* Footer */
  .footer { font-size: 11px; padding: 16px; }
}

}
