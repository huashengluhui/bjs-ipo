const PREV_CLOSE = 60.0;
let currentView = 'timeshare';

function buildTimeline() {
  const slots = ['09:30'];
  for(let m=31;m<=59;m++) slots.push('09:'+m);
  for(let m=0;m<=59;m++) slots.push('10:'+(m<10?'0'+m:m));
  for(let m=0;m<=30;m++) slots.push('11:'+(m<10?'0'+m:m));
  for(let m=1;m<=59;m++) slots.push('13:'+(m<10?'0'+m:m));
  for(let m=0;m<=59;m++) slots.push('14:'+(m<10?'0'+m:m));
  for(let m=0;m<=0;m++) slots.push('15:'+(m<10?'0'+m:m));
  return slots;
}

const upperChart = echarts.init(document.getElementById('chart-upper'));
const turnoverChart = echarts.init(document.getElementById('chart-turnover'));

function renderCharts(view) {
  const timeline = buildTimeline();
  const dataMap = {};
  RAW_DATA.forEach(d => dataMap[d.time] = d);

  const colors = view === 'timeshare' ? ['#e94560','#0f9ca0'] : ['#e94560','#0f9ca0'];

  if (view === 'timeshare') {
    const prices = [], changes = [], vols = [];
    let lastPrice = PREV_CLOSE;
    timeline.forEach(t => {
      if (dataMap[t]) { lastPrice = dataMap[t].close; prices.push(lastPrice); changes.push(((lastPrice-PREV_CLOSE)/PREV_CLOSE*100).toFixed(2)); vols.push(dataMap[t].vol); }
      else { prices.push(null); changes.push(null); vols.push(null); }
    });

    upperChart.setOption({
      tooltip:{ trigger:'axis',
        formatter(ps){ const t=ps[0].axisValue; const d=dataMap[t]; if(!d||ps[0].value==null) return '<b>'+t+'</b><br>暂无数据'; return '<b>'+t+'</b><br>价格：'+ps[0].value.toFixed(2)+'<br>涨幅：'+(ps[1]&&ps[1].value!=null?ps[1].value+'%':'-')+'<br>成交量：'+d.vol.toLocaleString(); }
      },
      grid:{ left:60,right:60,top:20,bottom:30 },
      xAxis:{ type:'category',data:timeline,axisLabel:{color:'#888',interval:29,showMaxLabel:true,fontSize:11} },
      yAxis:[
        { type:'value',scale:true,axisLabel:{color:'#888',formatter:v=>v.toFixed(2)},splitLine:{lineStyle:{color:'#333'}} },
        { type:'value',scale:true,axisLabel:{color:'#888',formatter:v=>v.toFixed(1)+'%'},splitLine:{show:false} }
      ],
      series:[
        { name:'价格',type:'line',data:prices,lineStyle:{color:'#e94560',width:2},areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(233,69,96,0.3)'},{offset:1,color:'rgba(233,69,96,0.03)'}])},symbol:'none',smooth:true,connectNulls:false },
        { name:'涨幅',type:'line',yAxisIndex:1,data:changes,lineStyle:{color:'#0f9ca0',width:1},symbol:'none',smooth:true,connectNulls:false }
      ]
    }, true);
  } else {
    const ohlc = [], vols = [];
    timeline.forEach(t => {
      if (dataMap[t]) { const d=dataMap[t]; ohlc.push([d.open,d.close,d.low,d.high]); vols.push([0,d.vol,d.close>=d.open?1:-1]); }
      else { ohlc.push(null); vols.push(null); }
    });

    upperChart.setOption({
      tooltip:{ trigger:'axis',formatter(ps){ const t=ps[0].axisValue; const d=dataMap[t]; if(!d) return '<b>'+t+'</b><br>暂无数据'; return '<b>'+t+'</b><br>开：'+d.open.toFixed(2)+'<br>收：'+d.close.toFixed(2)+'<br>高：'+d.high.toFixed(2)+'<br>低：'+d.low.toFixed(2)+'<br>量：'+d.vol.toLocaleString(); } },
      grid:[{ left:60,right:60,top:20,bottom:30,height:'65%' },{ left:60,right:60,top:'75%',height:'20%' }],
      xAxis:[
        { type:'category',data:timeline,gridIndex:0,axisLabel:{color:'#888',interval:29,showMaxLabel:true,fontSize:11},axisLine:{show:false},axisTick:{show:false} },
        { type:'category',data:timeline,gridIndex:1,axisLabel:{show:false},axisLine:{show:false},axisTick:{show:false} }
      ],
      yAxis:[
        { type:'value',scale:true,gridIndex:0,axisLabel:{color:'#888',formatter:v=>v.toFixed(2)},splitLine:{lineStyle:{color:'#333'}} },
        { type:'value',scale:true,gridIndex:1,axisLabel:{color:'#888'},splitLine:{lineStyle:{color:'#333'}} }
      ],
      series:[

    ]
  }, true);
}

window.switchView = function(view) {

};
